title = "TripPilot Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Idempotency UUIDs in message fixtures are identifiers, not API keys."
targetRules = ["generic-api-key"]
regexTarget = "line"
regexes = [
  '''(?i)"idempotencyKey"\s*:\s*"[0-9a-f]{8}-(?:[0-9a-f]{4}-){3}[0-9a-f]{12}"''',
]
