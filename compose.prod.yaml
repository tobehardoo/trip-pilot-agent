name: trip-pilot-prod

services:
  postgres:
    image: trip-pilot-postgres:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: infra/docker/postgres/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trip_pilot}
      POSTGRES_USER: ${POSTGRES_USER:-trip_pilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trip_pilot} -d ${POSTGRES_DB:-trip_pilot}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-trip_pilot}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  travel-server:
    image: trip-pilot-travel-server:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/travel-server/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-trip_pilot}
      POSTGRES_USER: ${POSTGRES_USER:-trip_pilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-trip_pilot}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 20

  agent-service:
    image: trip-pilot-agent-service:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/agent-service/Dockerfile
    restart: unless-stopped
    environment:
      DEMO_MODE: ${DEMO_MODE:-true}
      AMAP_WEB_SERVICE_KEY: ${AMAP_WEB_SERVICE_KEY:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-trip_pilot}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-trip_pilot}
      POSTGRES_USER: ${POSTGRES_USER:-trip_pilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      KNOWLEDGE_SOURCE_DIRECTORY: /app/knowledge/sources
      KNOWLEDGE_DATABASE_URL: ${KNOWLEDGE_DATABASE_URL:-}
      KNOWLEDGE_EMBEDDING_PROVIDER: ${KNOWLEDGE_EMBEDDING_PROVIDER:-demo}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-text-embedding-v4}
      KNOWLEDGE_EMBEDDING_DIMENSIONS: ${KNOWLEDGE_EMBEDDING_DIMENSIONS:-1024}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_EMBEDDING_BASE_URL: ${DASHSCOPE_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_EMBEDDING_TIMEOUT_SECONDS: ${DASHSCOPE_EMBEDDING_TIMEOUT_SECONDS:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      knowledge-init:
        condition: service_completed_successfully

  knowledge-init:
    image: trip-pilot-agent-service:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/agent-service/Dockerfile
    restart: "no"
    command:
      - /bin/sh
      - -c
      - >-
        /app/.venv/bin/trip-agent-knowledge migrate &&
        /app/.venv/bin/trip-agent-knowledge import /app/knowledge/guangzhou
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-trip_pilot}
      POSTGRES_USER: ${POSTGRES_USER:-trip_pilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      KNOWLEDGE_DATABASE_URL: ${KNOWLEDGE_DATABASE_URL:-}
      KNOWLEDGE_EMBEDDING_PROVIDER: ${KNOWLEDGE_EMBEDDING_PROVIDER:-demo}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-text-embedding-v4}
      KNOWLEDGE_EMBEDDING_DIMENSIONS: ${KNOWLEDGE_EMBEDDING_DIMENSIONS:-1024}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_EMBEDDING_BASE_URL: ${DASHSCOPE_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_EMBEDDING_TIMEOUT_SECONDS: ${DASHSCOPE_EMBEDDING_TIMEOUT_SECONDS:-10}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: trip-pilot-web:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_AMAP_WEB_JS_KEY: ${VITE_AMAP_WEB_JS_KEY:-}
        VITE_AMAP_SECURITY_CODE: ${VITE_AMAP_SECURITY_CODE:-}
    restart: unless-stopped
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8080}:8080"
    environment:
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:-172.30.250.1/32}
    depends_on:
      travel-server:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      travel-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9090/-/healthy | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:

networks:
  default:
    ipam:
      config:
        - subnet: ${APP_NETWORK_SUBNET:-172.30.250.0/24}
          gateway: ${APP_NETWORK_GATEWAY:-172.30.250.1}
