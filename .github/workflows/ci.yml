name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn --batch-mode verify

  python:
    runs-on: ubuntu-latest
    env:
      KNOWLEDGE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trip_pilot_knowledge_test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: trip_pilot_knowledge_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trip_pilot_knowledge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.4"
      - run: uv sync --frozen --extra dev
      - name: Validate official source registry
        run: uv run trip-agent-acquisition validate ../../knowledge/sources
      - name: Initialize pgvector extension
        run: >-
          uv run python -c "import psycopg;
          connection = psycopg.connect('${{ env.KNOWLEDGE_TEST_DATABASE_URL }}');
          connection.execute('CREATE EXTENSION IF NOT EXISTS vector');
          connection.commit(); connection.close()"
      - run: uv run ruff check .
      - run: uv run pytest --cov=trip_agent.retrieval --cov=trip_agent.acquisition --cov-report=term --cov-fail-under=80

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - run: pnpm build

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file .env.example config --quiet
      - name: Validate production Compose
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          RABBITMQ_PASSWORD: ci-rabbitmq-password
          JWT_SECRET: ci-only-jwt-secret-at-least-32-bytes-long
        run: docker compose -f compose.prod.yaml config --quiet
      - name: Build production images
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          RABBITMQ_PASSWORD: ci-rabbitmq-password
          JWT_SECRET: ci-only-jwt-secret-at-least-32-bytes-long
        run: docker compose -f compose.prod.yaml build postgres travel-server agent-service web

  repository-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Reject tracked secret files
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)(\.env($|\.)|.*\.(pem|key|p12|pfx)$)' | grep -v '\.env\.example$'; then
            echo "Tracked secret-like file detected"
            exit 1
          fi
